<!DOCTYPE html>
<html>
<head>
  <title>MyTube Home</title>
  <style>
    body { background:#0f0f0f; color:white; font-family:sans-serif; }
    .video { margin:20px; cursor:pointer; }
    img { width:100%; max-width:300px; border-radius:10px; }
  </style>
</head>

<body>

<h1>🔥 MyTube</h1>
<p id="user"></p>
<button onclick="logout()">Logout</button>

<hr>

<div class="video" onclick="openVideo('dQw4w9WgXcQ')">
  <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg">
  <p>🔥 Trending Video</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW35hUxcw9rm-5bGnrobzFarS2qm4J9SM",
  authDomain: "mytube-e395b.firebaseapp.com",
  projectId: "mytube-e395b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("user").innerText = "👤 " + user.email;
  } else {
    window.location.href = "index.html";
  }
});

window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

window.openVideo = (id) => {
  localStorage.setItem("videoId", id);
  window.location.href = "video.html";
};
</script>

</body>
</html>
