<!DOCTYPE html>
<html>
<body style="background:#0f0f0f;color:white">

<iframe id="player" width="100%" height="250"></iframe>

<h3 id="title"></h3>

<button onclick="like()">👍 Like</button>
<p id="likes">0 Likes</p>

<input id="c" placeholder="comment">
<button onclick="addComment()">Send</button>

<div id="comments"></div>

<script>
const id = new URLSearchParams(location.search).get("id");

// LOAD VIDEO
document.getElementById("player").src =
"https://www.youtube.com/embed/"+id;

// LOCAL STORAGE SYSTEM
let likes = localStorage.getItem(id+"_likes") || 0;
document.getElementById("likes").innerText = likes+" Likes";

// LIKE
function like(){
  likes++;
  localStorage.setItem(id+"_likes", likes);
  document.getElementById("likes").innerText = likes+" Likes";
}

// COMMENT
function addComment(){
  let text = document.getElementById("c").value;

  let arr = JSON.parse(localStorage.getItem(id+"_comments")||"[]");
  arr.push(text);

  localStorage.setItem(id+"_comments", JSON.stringify(arr));
  loadComments();
}

// LOAD COMMENTS
function loadComments(){
  let arr = JSON.parse(localStorage.getItem(id+"_comments")||"[]");
  document.getElementById("comments").innerHTML =
    arr.map(c=>"<p>"+c+"</p>").join("");
}

loadComments();
</script>

</body>
</html>
